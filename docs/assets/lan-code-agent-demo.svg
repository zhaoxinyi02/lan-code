<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1120" y1="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="0.45" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#F7F4FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop stop-color="#1473E6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1B2A4A" flood-opacity="0.16"/>
    </filter>
    <style>
      .panel{fill:#ffffffcc;stroke:#dbe6f6;stroke-width:1.2;filter:url(#shadow)}
      .muted{fill:#6d7684;font:500 18px 'Segoe UI',Arial,sans-serif}
      .title{fill:#101828;font:700 28px 'Segoe UI',Arial,sans-serif}
      .small{fill:#667085;font:500 14px 'Segoe UI',Arial,sans-serif}
      .code{fill:#344054;font:500 15px 'Cascadia Code','Consolas',monospace}
      .chip{fill:#eef6ff;stroke:#cfe2ff}
      .ok{fill:#13a05f}
      .line{stroke:url(#blue);stroke-width:3;stroke-linecap:round;stroke-dasharray:520;stroke-dashoffset:520;animation:draw 5.4s ease-in-out infinite}
      .pulse{animation:pulse 5.4s ease-in-out infinite}
      .step1{animation:fade 5.4s ease-in-out infinite}
      .step2{animation:fade 5.4s ease-in-out infinite;animation-delay:.8s}
      .step3{animation:fade 5.4s ease-in-out infinite;animation-delay:1.6s}
      .step4{animation:fade 5.4s ease-in-out infinite;animation-delay:2.4s}
      @keyframes draw{0%{stroke-dashoffset:520}18%,80%{stroke-dashoffset:0}100%{stroke-dashoffset:-520}}
      @keyframes fade{0%,12%{opacity:.25;transform:translateY(8px)}24%,78%{opacity:1;transform:translateY(0)}100%{opacity:.25;transform:translateY(-4px)}}
      @keyframes pulse{0%,100%{opacity:.6;transform:scale(.98)}50%{opacity:1;transform:scale(1)}}
    </style>
  </defs>
  <rect width="1120" height="560" rx="34" fill="url(#bg)"/>
  <rect x="42" y="42" width="250" height="476" rx="24" class="panel"/>
  <text x="76" y="92" class="title">Lan Code</text>
  <rect x="74" y="128" width="182" height="42" rx="13" fill="#101828"/>
  <text x="104" y="154" fill="white" font="700 15px 'Segoe UI',Arial">Agent</text>
  <text x="76" y="218" class="muted">项目</text>
  <text x="76" y="256" class="small">整理 AI 编程工具仓库</text>
  <text x="76" y="292" class="small">Office Mode 文档生成</text>
  <text x="76" y="328" class="small">代码审查与发布</text>
  <rect x="320" y="42" width="510" height="476" rx="24" class="panel"/>
  <text x="360" y="92" class="title">把任务交给 Agent</text>
  <text x="360" y="128" class="small">理解仓库、调用工具、修改代码、生成文档并审阅差异</text>
  <g class="step1">
    <rect x="360" y="170" width="410" height="64" rx="16" class="chip"/>
    <text x="384" y="198" class="code">read_file · apps/desktop/src/main.tsx</text>
    <text x="384" y="220" class="small">读取当前工作台结构</text>
  </g>
  <g class="step2">
    <rect x="360" y="252" width="410" height="64" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="384" y="280" class="code">replace_text · Office Engine</text>
    <text x="384" y="302" class="small">生成可审阅 Patch，不直接破坏原文件</text>
  </g>
  <g class="step3">
    <rect x="360" y="334" width="410" height="64" rx="16" fill="#ecfdf3" stroke="#bbf7d0"/>
    <text x="384" y="362" class="code">git_diff · +384 -27</text>
    <text x="384" y="384" class="small">汇总工作区改动和风险</text>
  </g>
  <g class="step4">
    <rect x="360" y="416" width="410" height="64" rx="16" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="384" y="444" class="code">release · Windows installer</text>
    <text x="384" y="466" class="small">本地构建并触发 GitHub Release</text>
  </g>
  <path d="M815 280 C860 280 862 280 902 280" class="line"/>
  <rect x="872" y="90" width="206" height="380" rx="24" class="panel pulse"/>
  <text x="908" y="142" class="title">结果</text>
  <circle cx="920" cy="196" r="9" class="ok"/>
  <text x="942" y="202" class="small">代码已修改</text>
  <circle cx="920" cy="244" r="9" class="ok"/>
  <text x="942" y="250" class="small">文档已生成</text>
  <circle cx="920" cy="292" r="9" class="ok"/>
  <text x="942" y="298" class="small">Diff 可审阅</text>
  <circle cx="920" cy="340" r="9" class="ok"/>
  <text x="942" y="346" class="small">安装包就绪</text>
  <rect x="908" y="386" width="120" height="38" rx="12" fill="url(#blue)"/>
  <text x="938" y="410" fill="white" font="700 15px 'Segoe UI',Arial">Ship it</text>
</svg>
