<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" x2="1120" y1="0" y2="560">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F4F0FF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <style>
      .panel{fill:#ffffffd9;stroke:#dde7f4;filter:url(#shadow)}
      .title{fill:#111827;font:700 28px 'Segoe UI',Arial,sans-serif}
      .muted{fill:#667085;font:500 14px 'Segoe UI',Arial,sans-serif}
      .doc{fill:white;stroke:#e5e7eb;filter:url(#shadow)}
      .h{fill:#101828;font:700 18px 'Segoe UI',Arial,sans-serif}
      .p{fill:#475467;font:500 13px 'Segoe UI',Arial,sans-serif}
      .ai{animation:slide 6s ease-in-out infinite}
      .ghost{animation:ghost 6s ease-in-out infinite}
      .diff{animation:diff 6s ease-in-out infinite}
      @keyframes slide{0%,16%{transform:translateX(80px);opacity:.25}32%,82%{transform:translateX(0);opacity:1}100%{transform:translateX(80px);opacity:.25}}
      @keyframes ghost{0%,32%{opacity:0;transform:translateY(18px)}44%,78%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-8px)}}
      @keyframes diff{0%,46%{opacity:0;transform:translateX(-20px)}58%,88%{opacity:1;transform:translateX(0)}100%{opacity:0}}
    </style>
  </defs>
  <rect width="1120" height="560" rx="34" fill="url(#bg)"/>
  <rect x="42" y="42" width="230" height="476" rx="24" class="panel"/>
  <text x="72" y="92" class="title">Office</text>
  <rect x="70" y="132" width="172" height="42" rx="13" fill="#eef6ff" stroke="#cfe2ff"/>
  <text x="96" y="158" fill="#176bd6" font="700 15px 'Segoe UI',Arial">文件</text>
  <text x="76" y="218" class="muted">报告.docx</text>
  <text x="76" y="254" class="muted">数据.xlsx</text>
  <text x="76" y="290" class="muted">答辩.pptx</text>
  <rect x="318" y="50" width="470" height="460" rx="18" class="doc"/>
  <text x="372" y="112" class="h">课程设计报告</text>
  <rect x="372" y="142" width="300" height="10" rx="5" fill="#d0d5dd"/>
  <rect x="372" y="166" width="350" height="9" rx="5" fill="#eaecf0"/>
  <rect x="372" y="190" width="320" height="9" rx="5" fill="#eaecf0"/>
  <text x="372" y="250" class="h">4 课设小结</text>
  <rect x="372" y="282" width="336" height="10" rx="5" fill="#d0d5dd"/>
  <rect x="372" y="306" width="350" height="9" rx="5" fill="#eaecf0"/>
  <rect x="372" y="330" width="292" height="9" rx="5" fill="#eaecf0"/>
  <g class="ghost">
    <rect x="354" y="364" width="382" height="78" rx="14" fill="#eef6ff" stroke="#7bb6ff"/>
    <text x="378" y="394" fill="#176bd6" font="700 14px 'Segoe UI',Arial">AI Ghost Edit</text>
    <text x="378" y="420" class="p">在当前位置补充课程设计小结，保留原段落样式。</text>
  </g>
  <g class="ai">
    <rect x="834" y="72" width="244" height="416" rx="24" class="panel"/>
    <text x="866" y="122" class="title">AI 助手</text>
    <text x="866" y="156" class="muted">可见范围：当前文件 / 选区 / Diff</text>
    <rect x="866" y="194" width="174" height="58" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="884" y="220" class="p">生成操作计划</text>
    <text x="884" y="240" class="muted">replace_text</text>
    <rect x="866" y="272" width="174" height="58" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="884" y="298" class="p">创建临时副本</text>
    <text x="884" y="318" class="muted">backup ready</text>
    <rect x="866" y="350" width="174" height="58" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="884" y="376" class="p">预览 Office Diff</text>
    <text x="884" y="396" class="muted">等待用户应用</text>
  </g>
  <g class="diff">
    <rect x="70" y="354" width="178" height="112" rx="16" fill="#fff" stroke="#e5e7eb"/>
    <text x="92" y="384" fill="#16a34a" font="700 13px 'Segoe UI',Arial">+ 插入 126 字</text>
    <text x="92" y="414" fill="#dc2626" font="700 13px 'Segoe UI',Arial">- 无破坏修改</text>
    <text x="92" y="444" class="muted">可应用 / 可回滚</text>
  </g>
</svg>
