name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
        working-directory: apps/desktop
      - run: npm run build
        working-directory: apps/desktop
      - run: cargo test --workspace
      - run: npm run tauri build
        working-directory: apps/desktop
      - name: Build branded installer
        shell: pwsh
        run: .\scripts\build-branded-installer.ps1 -SkipDesktopBuild
      - run: .\scripts\package-windows.ps1
      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/lan-code-*-windows-x64.zip,dist/Lan*setup.exe,target/release/bundle/msi/*.msi | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -Encoding ascii -LiteralPath "$($_.FullName).sha256"
          }
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lan-code-*-windows-x64.zip
            dist/lan-code-*-windows-x64.zip.sha256
            dist/Lan*setup.exe
            dist/Lan*setup.exe.sha256
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.msi.sha256
